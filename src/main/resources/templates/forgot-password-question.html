<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/base :: layout('Security Question - RevShop', ~{::section})}">

<head></head>

<body>
    <section class="auth-wrapper d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card glass-panel border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="fa-solid fa-shield-halved fs-1 text-primary mb-3"></i>
                                <h2 class="fw-bold text-dark">Security Verification</h2>
                                <p class="text-secondary">Please answer the security question below.</p>
                            </div>

                            <!-- Error Message Alerts -->
                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <i class="fa-solid fa-circle-exclamation me-2"></i><span th:text="${error}"></span>
                            </div>

                            <form th:action="@{/forgot-password-question}" method="post">
                                <div class="mb-4">
                                    <label class="form-label text-secondary small fw-bold">Security Question</label>
                                    <p class="fw-bold fs-5 text-dark" th:text="${question}"></p>
                                </div>

                                <div class="mb-4">
                                    <label for="answer" class="form-label text-secondary small fw-bold">Your
                                        Answer</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fa-solid fa-pen text-secondary"></i>
                                        </span>
                                        <input type="text" class="form-control bg-light border-start-0 py-2 shadow-none"
                                            id="answer" name="answer" required placeholder="Type your answer here">
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-pill mb-3">
                                    Verify Answer
                                </button>
                            </form>

                            <div class="text-center mt-3">
                                <a th:href="@{/forgot-password}"
                                    class="text-decoration-none small text-primary custom-hover">
                                    <i class="fa-solid fa-arrow-left me-1"></i> Try different email
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
