<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/base :: layout('Reset Password - RevShop', ~{::section})}">

<head></head>

<body>
    <section class="auth-wrapper d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card glass-panel border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <i class="fa-solid fa-lock-open fs-1 text-primary mb-3"></i>
                                <h2 class="fw-bold text-dark">Reset Password</h2>
                                <p class="text-secondary">Please enter your new password.</p>
                            </div>

                            <form th:action="@{/reset-password}" method="post">
                                <div class="mb-4">
                                    <label for="password" class="form-label text-secondary small fw-bold">New
                                        Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fa-solid fa-lock text-secondary"></i>
                                        </span>
                                        <input type="password"
                                            class="form-control bg-light border-start-0 py-2 shadow-none" id="password"
                                            name="password" required placeholder="••••••••">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label text-secondary small fw-bold">Confirm
                                        Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0">
                                            <i class="fa-solid fa-check-double text-secondary"></i>
                                        </span>
                                        <input type="password"
                                            class="form-control bg-light border-start-0 py-2 shadow-none"
                                            id="confirmPassword" required placeholder="••••••••">
                                    </div>
                                    <div id="passwordError" class="text-danger small mt-1" style="display: none;">
                                        Passwords do not match.</div>
                                </div>

                                <button type="submit" id="submitBtn"
                                    class="btn btn-primary w-100 py-2 fw-bold rounded-pill mb-3">
                                    Reset Password
                                </button>
                            </form>

                            <script>
                                const password = document.getElementById('password');
                                const confirmPassword = document.getElementById('confirmPassword');
                                const error = document.getElementById('passwordError');
                                const submitBtn = document.getElementById('submitBtn');

                                function validate() {
                                    if (password.value !== confirmPassword.value && confirmPassword.value !== '') {
                                        error.style.display = 'block';
                                        submitBtn.disabled = true;
                                    } else {
                                        error.style.display = 'none';
                                        submitBtn.disabled = false;
                                    }
                                }

                                password.addEventListener('input', validate);
                                confirmPassword.addEventListener('input', validate);
                            </script>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
